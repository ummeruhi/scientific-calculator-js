<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <section class="app" aria-label="Scientific Calculator">
      <header class="top">
        <div class="brand">
          <h1>Scientific Calculator</h1>
          <p>DOM • JS • Compact UI</p>
        </div>

        <div class="top-actions">
          <button id="themeBtn" class="chip" type="button" aria-label="Toggle theme">🌙 Dark</button>
          <button id="angleBtn" class="chip" type="button" aria-label="Toggle degrees/radians">DEG</button>
          <button id="secondBtn" class="chip" type="button" aria-label="Toggle second functions">2nd: OFF</button>
        </div>
      </header>

      <div class="main">
        <!-- Calculator -->
        <section class="calc">
          <div class="display">
            <div class="meta">
              <span id="memBadge" class="badge hidden" title="Memory not empty">M</span>
              <span id="modeBadge" class="badge">DEG</span>
              <span id="secondBadge" class="badge subtle">2nd OFF</span>
            </div>

            <div id="historyLine" class="history-line" aria-live="polite"></div>
            <input id="screen" class="screen" type="text" autocomplete="off" spellcheck="false" aria-label="Calculator screen" />
            <div id="errorLine" class="error-line" aria-live="polite"></div>
          </div>

          <div class="pad" role="group" aria-label="Calculator keys">
            <!-- Memory row -->
            <button class="btn ghost" data-action="mc">MC</button>
            <button class="btn ghost" data-action="mr">MR</button>
            <button class="btn ghost" data-action="mplus">M+</button>
            <button class="btn ghost" data-action="mminus">M-</button>
            <button class="btn soft" data-action="ans">ANS</button>
            <button class="btn soft" data-action="clear">AC</button>

            <!-- Functions row -->
            <button class="btn soft" data-action="sin" data-alt="asin">sin</button>
            <button class="btn soft" data-action="cos" data-alt="acos">cos</button>
            <button class="btn soft" data-action="tan" data-alt="atan">tan</button>
            <button class="btn soft" data-action="log" data-alt="pow10">log</button>
            <button class="btn soft" data-action="ln" data-alt="exp">ln</button>
            <button class="btn soft" data-action="back">⌫</button>

            <!-- More functions -->
            <button class="btn soft" data-action="sqrt">√</button>
            <button class="btn soft" data-action="square">x²</button>
            <button class="btn soft" data-action="pow">xʸ</button>
            <button class="btn soft" data-action="inv">1/x</button>
            <button class="btn soft" data-action="fact">n!</button>
            <button class="btn soft" data-action="percent">%</button>

            <!-- Brackets/constants/operators -->
            <button class="btn num" data-insert="(">(</button>
            <button class="btn num" data-insert=")">)</button>
            <button class="btn num" data-action="pi">π</button>
            <button class="btn num" data-action="e">e</button>
            <button class="btn op" data-insert="/">÷</button>
            <button class="btn op" data-insert="*">×</button>

            <!-- Numbers row -->
            <button class="btn num" data-insert="7">7</button>
            <button class="btn num" data-insert="8">8</button>
            <button class="btn num" data-insert="9">9</button>
            <button class="btn op" data-insert="-">−</button>
            <button class="btn soft" data-action="sign">±</button>
            <button class="btn eq" data-action="equals">=</button>

            <button class="btn num" data-insert="4">4</button>
            <button class="btn num" data-insert="5">5</button>
            <button class="btn num" data-insert="6">6</button>
            <button class="btn op" data-insert="+">+</button>
            <button class="btn num" data-insert=".">.</button>
            <button class="btn num" data-insert="1">1</button>
            <button class="btn num" data-insert="2">2</button>

            <button class="btn num" data-insert="3">3</button>
            <button class="btn num wide" data-insert="0">0</button>
            
            <button class="btn ghost tiny" data-action="clearHistory">Clear History</button>
            <button class="btn ghost tiny" data-action="copy">Copy</button>
            <button class="btn ghost tiny" data-action="paste">Paste</button>
            <button class="btn ghost tiny" data-action="help">Shortcuts</button>
          </div>

          <footer class="hint">
            <span>
              Keys: <kbd>0-9</kbd> <kbd>+</kbd><kbd>-</kbd><kbd>*</kbd><kbd>/</kbd>
              <kbd>(</kbd><kbd>)</kbd> <kbd>Enter</kbd>= <kbd>Backspace</kbd>⌫ <kbd>Esc</kbd>AC
            </span>
          </footer>
        </section>

        <!-- History panel -->
        <aside class="history">
          <div class="history-top">
            <h2>History</h2>
            <button id="historyClearBtn" class="mini" type="button">Clear</button>
          </div>
          <div id="historyList" class="history-list" aria-label="History list"></div>
          <div class="history-foot">
            <span class="muted">Tip: click an item to reuse.</span>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
